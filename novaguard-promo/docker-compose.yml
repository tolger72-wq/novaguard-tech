version: "3.9"

services:
  api:
    build: .
    container_name: novaguard_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    container_name: novaguard_worker
    command: celery -A app.worker celery -A app.worker worker --beat --loglevel=info
    env_file: .env          # FIX 6 — worker artık aynı .env'i okuyor
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
      api:   { condition: service_healthy }
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: novaguard_db
    env_file: .env
    environment:
      POSTGRES_USER: promo
      POSTGRES_PASSWORD: promo
      POSTGRES_DB: novaguard_promo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promo -d novaguard_promo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: novaguard_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
